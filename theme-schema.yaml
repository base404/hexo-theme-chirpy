            label: "Vintage (怀旧复古)"

          - value: "agentic"
            label: "Agentic (Conversational AI-first interface with minimal controls, clear outcomes, and delegated task flows for agentic workflows.)"
          - value: "ant"
            label: "Ant (Structured, enterprise-focused design system emphasizing clarity, consistency, and efficiency for data-dense web applications.)"
          - value: "artistic"
            label: "Artistic (High-contrast, expressive style with creative typography and bold color choices for visually striking interfaces.)"
          - value: "basic"
            label: "Basic (Print-inspired visual language for books, magazines, and reports with editorial grids and expressive typography.)"
          - value: "bento"
            label: "Bento (Modular grid layout with card-like blocks, clear hierarchy, soft spacing, and subtle visual contrast for organized, scannable interfaces.)"
          - value: "bold"
            label: "Bold (Strong visual presence with heavyweight typography, high-contrast colors, and commanding layouts.)"
          - value: "brutalism"
            label: "Brutalism (Raw, anti-design aesthetic inspired by concrete architecture with unadorned elements, jarring layouts, and functional minimalism.)"
          - value: "cafe"
            label: "Cafe (Cozy cafe-inspired interface with warm tones, soft typography, and clean layouts for a relaxed browsing experience.)"
          - value: "claude"
            label: "\"claude\" (\"A research-journal aesthetic printed on warm stone — authoritative, editorial, almost achromatic. Pages live on warm ivory parchment (never pure white), with near-black slate as the dominant ink.\")"
          - value: "claymorphism"
            label: "Claymorphism (Soft, rounded 3D-like shapes mimicking malleable clay with playful, puffy elements and colorful surfaces.)"
          - value: "clean"
            label: "Clean (Simplicity-focused design with ample whitespace, legible typography, and a limited color palette to reduce visual clutter.)"
          - value: "codex"
            label: "\"codex\" (\"A radically minimal, blank-canvas interface built as a pure edge-to-edge surface, with almost no color and typography carrying the visual weight. Black serves as the only filled color, the only divider, and the sole surface tone cards.\")"
          - value: "colorful"
            label: "Colorful (Vibrant, high-contrast palettes and gradients for engaging, memorable, and modern user experiences.)"
          - value: "contemporary"
            label: "Contemporary (Current-era minimalist design with bento grids, dark mode support, and high-performance accessible layouts.)"
          - value: "corporate"
            label: "Corporate (Professional, brand-aligned design with structured grids, minimalist layouts, and consistent enterprise patterns.)"
          - value: "cosmic"
            label: "Cosmic (Futuristic sci-fi aesthetic with dark themes, vibrant neon accents, and immersive spatial elements.)"
          - value: "creative"
            label: "Creative (Playful, character-driven design with expressive typography and bold graphics for landing pages and creative projects.)"
          - value: "dithered"
            label: "Dithered (Dot-pattern rendering technique that simulates shades with a limited palette for nostalgic, retro, high-contrast visuals.)"
          - value: "doodle"
            label: "Doodle (Hand-drawn, sketch-like style with doodles, handwritten fonts, and imperfect lines for a playful, informal feel.)"
          - value: "dramatic"
            label: "Dramatic (High-contrast, theatrical design with bold layouts, immersive visuals, and unconventional compositions that command attention.)"
          - value: "editorial"
            label: "Editorial (Magazine-inspired editorial layout with refined serif typography, structured grids, and elegant reading experiences.)"
          - value: "enterprise"
            label: "Enterprise (Dark-themed cloud-platform aesthetic with modular grids, glass-like panels, and strong data hierarchy for productivity dashboards.)"
          - value: "expressive"
            label: "Expressive (Vibrant, personality-driven design with bold colors, playful graphics, and dynamic layouts that balance creativity with structure.)"
          - value: "fantasy"
            label: "Fantasy (Game-inspired fantasy aesthetic with bold, premium visuals, rich color palettes, and immersive thematic elements.)"
          - value: "fiction"
            label: "\"fiction\" (\"A playful, energetic, cartoonesque interface inspired by friendly children's-book illustrations — warm cream backgrounds, big bold custom display typography, saturated brand color blocks, thick black outlines, generously rounded shapes\")"
          - value: "flat"
            label: "Flat (Two-dimensional minimalist style with vibrant colors, clean typography, and no 3D effects for fast, user-friendly interfaces.)"
          - value: "friendly"
            label: "Friendly (Approachable, intuitive design with rounded elements, ample whitespace, and soft pastel color palettes.)"
          - value: "futuristic"
            label: "Futuristic (Forward-looking design with tech-inspired typography, modern layouts, and a sleek, innovation-driven aesthetic.)"
          - value: "geometric"
            label: "Geometric (Geometric, structured design with clean typography, neutral colors, precise shapes, and intuitive layouts that stay out of the way.)"
          - value: "glassmorphism"
            label: "Glassmorphism (Frosted glass effect with translucent layers, subtle blur, and luminous borders for depth and modern elegance.)"
          - value: "gradient"
            label: "Gradient (Smooth color transitions and gradient-rich surfaces for modern, playful interfaces with visual depth.)"
          - value: "immersive"
            label: "\"immersive\" (\"An immersive, interactive, exhibit-style interface that blends storytelling, animation, and gamified elements to create a playful, experience-driven journey. The entire app sits on a single continuous brand-colored canvas (deep green)\")"
          - value: "impeccable"
            label: "\"impeccable\" (\"A modern, graphic, editorial-poster aesthetic — warm and confident — built on alternating cream and burnt orange sections, an amber brand color.\")"
          - value: "levels"
            label: "Levels (Conversion-focused design that removes friction and guides users toward action through clarity, trust, and speed.)"
          - value: "lingo"
            label: "Lingo (Playful, minimal design with bright colors, rounded shapes, tactile 3D borders, and friendly illustrations for approachable interfaces.)"
          - value: "material"
            label: "Material (Google's Material Design with layered surfaces, dynamic theming, built-in motion, and responsive cross-platform patterns.)"
          - value: "matrix"
            label: "\"matrix\" (\"A cyber-slick, dark-only Matrix-inspired interface defined by minimalist fashion, high-tech digital elements\")"
          - value: "minimal"
            label: "Minimal (Stripped-back design emphasizing whitespace, clean typography, and restrained color for maximum clarity and focus.)"
          - value: "modern"
            label: "Modern (Contemporary editorial style with serif typography, minimal palettes, and clean layouts for polished digital products.)"
          - value: "mono"
            label: "Mono (Monospace-driven, matrix-inspired design with high-contrast elements, compact density, and a hacker-chic aesthetic.)"
          - value: "neobrutalism"
            label: "Neobrutalism (Modern take on brutalism with bold borders, vivid accent colors, and raw, high-contrast layouts on warm surfaces.)"
          - value: "neon"
            label: "Neon (Electric neon glow effects with high-contrast color pairings for bold, attention-grabbing interfaces.)"
          - value: "neumorphism"
            label: "Neumorphism (Soft, extruded UI elements with inner and outer shadows on monochromatic surfaces for a tactile, embedded look.)"
          - value: "pacman"
            label: "Pacman (Retro arcade-inspired design with pixel fonts, dotted borders, playful high-contrast colors, and 8-bit game aesthetics.)"
          - value: "paper"
            label: "Paper (Paper-textured, print-inspired design with minimal colors, clean serif/sans typography, and tactile surface qualities.)"
          - value: "perspective"
            label: "Perspective (Spatial depth design with isometric views, vanishing points, and layered elements that guide attention through 3D-like realism.)"
          - value: "power"
            label: "Power (High-end dark aesthetic with bold headings, monochromatic palette, and premium feel for premium brand experiences.)"
          - value: "premium"
            label: "Premium (Apple-inspired premium aesthetic with precise spacing, modern typography, and a refined, polished visual language.)"
          - value: "professional"
            label: "Professional (Polished, business-ready design with modern typography, structured layouts, and a trustworthy visual identity.)"
          - value: "pulse"
            label: "Pulse (Dynamic, vibrant style with thick borders, geometric shapes, high-contrast colors, and expressive typography conveying motion and vitality.)"
          - value: "refined"
            label: "Refined (Carefully curated, modern minimal style with elegant serif typography and understated, sophisticated palettes.)"
          - value: "retro"
            label: "Retro (Throwback design with vintage-inspired typography, high-contrast retro palettes, and nostalgic visual elements.)"
          - value: "riso"
            label: "\"riso\" (\"A playful, joyful, two-color risograph print aesthetic built on a single warm off-white paper surface running through every section\")"
          - value: "roku"
            label: "Roku (App dashboard with purple-themed aesthetic, top-bar navigation, card-based layouts, and developer-first workflows.)"
          - value: "sega"
            label: "\"sega\" (\"A playful, arcade-inspired interface for games — built on the VT323 pixel typeface, hard-edged 0px corners, chunky pill buttons that physically press into solid offset blocks\")"
          - value: "shadcn"
            label: "Shadcn (Shadcn/ui-inspired design with minimal, clean components, monochrome palette, and utility-first patterns.)"
          - value: "sketch"
            label: "\"sketch\" (\"A friendly, hand-drawn sketch interface inspired by pencil illustrations on warm cream paper. Soft teal brand accents, hand-written display headings, rounded pill controls.\")"
          - value: "skeumorphism"
            label: "Skeumorphism (Real-world mimicry with textured surfaces, 3D effects, and familiar physical metaphors for intuitive digital interfaces.)"
          - value: "sleek"
            label: "Sleek (Modern minimalist aesthetic with clean lines, intentional color palette, subtle interactions, and consistent spacing.)"
          - value: "spacious"
            label: "Spacious (Generous whitespace, consistent padding, and grid-based layouts for clean, readable, and breathing interfaces.)"
          - value: "square"
            label: "Square (Graceful, refined aesthetic with delicate typography, minimal palettes, and polished layouts that exude sophistication.)"
          - value: "stitch"
            label: "Stitch (Clean, high-contrast enterprise design for data-driven workflows with intuitive drag-and-drop patterns and structured layouts.)"
          - value: "storytelling"
            label: "Storytelling (Narrative-driven design using visuals, copy, and interaction to guide users through engaging, emotionally resonant journeys.)"
          - value: "terracotta"
            label: "\"terracotta\" (\"A sun-baked, clay-toned editorial interface built on warm cream surfaces, ink-brown headlines set in a display serif, and a single terracotta accent.\")"
          - value: "tetris"
            label: "Tetris (Classic block-game inspired design with playful colors, bold display fonts, and compact, high-energy layouts.)"
          - value: "vibrant"
            label: "Vibrant (Lively, colorful design with bold playful typography, warm accents, and dynamic visual energy.)"
          - value: "vintage"
            label: "Vintage (1950s-1990s nostalgia with skeuomorphic touches, grainy textures, retro color palettes, and pixel-style typography.)"

          - value: "nordic"
            label: "Nordic Minimal (北欧极简极地蓝)"
          - value: "cyberpunk"
            label: "Cyberpunk Neon (赛博霓虹暗黑风)"
          - value: "glassmorphism"
            label: "Glassmorphism (磨砂玻璃质感与极光动感)"

      - name: "color_scheme"
        label: "主题明暗模式"
        type: "select"
        description: "控制页面的默认色彩模式"
        default: "auto"
        options:
          - value: "auto"
            label: "跟随系统 (Auto System)"
          - value: "light"
            label: "默认浅色 (Light)"
          - value: "dark"
            label: "默认深色 (Dark)"

      - name: "accent_color"
        label: "品牌强调色 (Accent)"
        type: "color"
        description: "链接、选中态高亮与按钮强调色"
        default: "#7952b3"

  - id: "features"
    label: "交互功能开关"
    icon: "sliders"
    fields:
      - name: "toc_enabled"
        label: "文章 TOC 悬浮目录"
        type: "switch"
        description: "在文章页右侧悬浮显示层次化的标题导航目录"
        default: true

      - name: "reading_progress"
        label: "阅读进度条"
        type: "switch"
        description: "在页面顶部显示实时滚动阅读百分比条"
        default: true

      - name: "code_copy"
        label: "代码块一键复制按钮"
        type: "switch"
        description: "在所有代码高亮块右上角生成快捷复制图标"
        default: true

      - name: "per_page"
        label: "首页每页显示文章数"
        type: "number"
        default: 10
        min: 1
        max: 50

  - id: "comments"
    label: "评论系统设置"
    icon: "message-square"
    fields:
      - name: "comments_enabled"
        label: "启用评论区"
        type: "switch"
        description: "开启后将在文章、友链及关于页面底部显示评论框"
        default: false

      - name: "comments_provider"
        label: "评论服务提供商"
        type: "select"
        default: "waline"
        options:
          - value: "waline"
            label: "Waline (推荐：轻量美观全能)"
          - value: "giscus"
            label: "Giscus (GitHub Discussions)"
          - value: "disqus"
            label: "Disqus"

      - name: "waline_server_url"
        label: "Waline 服务端 URL"
        type: "text"
        description: "例如: https://your-waline-instance.vercel.app"
