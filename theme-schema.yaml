schema_version: "1.0"

meta:
  name: "chirpy"
  display_name: "Chirpy Classic"
  description: "简约、高颜值且功能丰富的 Hexo 技术博客主题（参考 Chirpy 经典三栏设计）"
  version: "1.0.0"
  author: "Hexo CMS Team"
  homepage: "https://github.com/base404/hexo-theme-chirpy"
  preview: "https://www.airbozh.cn/"
  tags: ["三栏布局", "Dark Mode", "TOC", "响应式", "代码复制", "进度条", "友链", "关于页面", "评论支持"]

groups:
  - id: "basic"
    label: "基础信息与个人资料"
    icon: "globe"
    fields:
      - name: "avatar"
        label: "侧边栏头像 URL / 相对路径"
        type: "text"
        description: "主题路径下的相对图片 (如 /images/avatar.png) 或网络图片 URL"
        default: "/images/avatar.png"

      - name: "author"
        label: "博主名称"
        type: "text"
        description: "侧边栏显示的博主名字"
        default: "AirboZH"

      - name: "subtitle"
        label: "座右铭 / 签名"
        type: "text"
        description: "头像下方的斜体签名"
        default: "Stay Hungry, Stay Foolish"

      - name: "favicon"
        label: "站点 Favicon"
        type: "text"
        description: "浏览器标签页小图标"
        default: "/favicon.ico"

  - id: "social"
    label: "左侧栏社交联系方式 (配置后才显示)"
    icon: "share-2"
    fields:
      - name: "social.github"
        label: "GitHub 个人主页 URL"
        type: "text"
        description: "例如: https://github.com/your-username (留空则不显示图标)"
        default: "https://github.com"

      - name: "social.rss"
        label: "RSS 订阅 Feed 路径"
        type: "text"
        description: "例如: /atom.xml (留空则不显示图标)"
        default: "/atom.xml"

      - name: "social.email"
        label: "电子邮箱 (Email)"
        type: "text"
        description: "例如: mailto:your_name@example.com 或 邮箱地址 (留空则不显示图标)"
        default: ""

      - name: "social.qq"
        label: "QQ 号码 / 联系链接"
        type: "text"
        description: "例如: 123456789 或 tencent 临时会话链接 (留空则不显示图标)"
        default: ""

      - name: "social.wechat"
        label: "微信微信号 / 二维码图片路径"
        type: "text"
        description: "例如: /images/wechat_qr.png 或微信号 (留空则不显示图标)"
        default: ""

  - id: "about"
    label: "关于页面配置 (About Page)"
    icon: "globe"
    fields:
      - name: "about.name"
        label: "关于页显示名称"
        type: "text"
        default: "Nuoka"

      - name: "about.role"
        label: "职业 / 角色标签"
        type: "text"
        default: "Full Stack Developer / Technical Writer"

      - name: "about.bio"
        label: "一句话简介 / 签名"
        type: "text"
        default: "热爱代码、开源与写作，致力于构建极致体验的 Web 应用与静态博客工具。"

      - name: "about.description"
        label: "关于页正文 Markdown 描述"
        type: "textarea"
        description: "可填写 Markdown 格式的个人经历、技术栈与博客介绍"
        default: "欢迎来到我的博客！这里记录了我关于前端架构、后台服务以及工具链设计的探索。"

  - id: "links"
    label: "友链页面配置 (Friends Links)"
    icon: "globe"
    fields:
      - name: "friends"
        label: "友情链接列表"
        type: "array"
        description: "每条友链包含：站点名称、网址、头像 URL、简介。可添加/删除/修改。"
        default: []
        itemFields:
          - key: "name"
            label: "站点名称"
            placeholder: "My Friend's Blog"
          - key: "url"
            label: "网址"
            placeholder: "https://example.com"
          - key: "avatar"
            label: "头像 URL"
            placeholder: "https://example.com/avatar.png"
          - key: "desc"
            label: "一句话简介"
            placeholder: "热爱分享的技术博主"

      - name: "links_apply_tip"
        label: "申请友链说明 (Markdown 格式)"
        type: "textarea"
        description: "在友链页面卡片下方显示的申请规则说明"
        default: "欢迎交换友情链接！请在此页面下方留言或按照格式申请。"

  - id: "style"
    label: "外观与视觉风格"
    icon: "palette"
    fields:
      - name: "style_preset"
        label: "设计预设风格 (Preset)"
        type: "select"
        description: "基于 awesome-design-skills 挑选的最佳配色方案"
        default: "chirpy"
        options:
          - value: "chirpy"
            label: "Chirpy Classic (经典暗极灰 + 紫禁青)"
          - value: "nordic"
            label: "Nordic Minimal (北欧极简极地蓝)"
          - value: "cyberpunk"
            label: "Cyberpunk Neon (赛博霓虹暗黑风)"
          - value: "glassmorphism"
            label: "Glassmorphism (磨砂玻璃质感与极光动感)"

      - name: "color_scheme"
        label: "主题明暗模式"
        type: "select"
        description: "控制页面的默认色彩模式"
        default: "auto"
        options:
          - value: "auto"
            label: "跟随系统 (Auto System)"
          - value: "light"
            label: "默认浅色 (Light)"
          - value: "dark"
            label: "默认深色 (Dark)"

      - name: "accent_color"
        label: "品牌强调色 (Accent)"
        type: "color"
        description: "链接、选中态高亮与按钮强调色"
        default: "#7952b3"

  - id: "features"
    label: "交互功能开关"
    icon: "sliders"
    fields:
      - name: "toc_enabled"
        label: "文章 TOC 悬浮目录"
        type: "switch"
        description: "在文章页右侧悬浮显示层次化的标题导航目录"
        default: true

      - name: "reading_progress"
        label: "阅读进度条"
        type: "switch"
        description: "在页面顶部显示实时滚动阅读百分比条"
        default: true

      - name: "code_copy"
        label: "代码块一键复制按钮"
        type: "switch"
        description: "在所有代码高亮块右上角生成快捷复制图标"
        default: true

      - name: "per_page"
        label: "首页每页显示文章数"
        type: "number"
        default: 10
        min: 1
        max: 50

  - id: "comments"
    label: "评论系统设置"
    icon: "message-square"
    fields:
      - name: "comments_enabled"
        label: "启用评论区"
        type: "switch"
        description: "开启后将在文章、友链及关于页面底部显示评论框"
        default: true

      - name: "comments_provider"
        label: "评论服务提供商"
        type: "select"
        default: "waline"
        options:
          - value: "waline"
            label: "Waline (推荐：轻量美观全能)"
          - value: "giscus"
            label: "Giscus (GitHub Discussions)"
          - value: "disqus"
            label: "Disqus"

      - name: "waline_server_url"
        label: "Waline 服务端 URL"
        type: "text"
        description: "例如: https://your-waline-instance.vercel.app"
        default: ""

      - name: "disqus_shortname"
        label: "Disqus Shortname"
        type: "text"
        default: ""

      - name: "giscus_repo"
        label: "Giscus 仓库 (owner/repo)"
        type: "text"
        default: ""

  - id: "custom_code"
    label: "自定义代码注入"
    icon: "code"
    fields:
      - name: "head_code"
        label: "<head> 注入代码"
        type: "code"
        language: "html"
        description: "自定义注入到页面 <head> 区域的统计脚本或 CSS"
        default: ""

      - name: "footer_code"
        label: "页脚 </body> 注入代码"
        type: "code"
        language: "html"
        description: "自定义注入到页面尾部的 JS 扩展"
        default: ""
