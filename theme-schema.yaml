schema_version: "1.0"

meta:
  name: "chirpy"
  display_name: "Chirpy Classic"
  description: "简约、高颜值且功能丰富的 Hexo 技术博客主题（零配置开箱即用，自动路由与 Mermaid 绘图）"
  version: "2.0.0"
  author: "Hexo CMS Team"
  homepage: "https://github.com/base404/hexo-theme-chirpy"
  tags: ["三栏布局", "Dark Mode", "TOC", "响应式", "代码复制", "进度条", "友链", "关于页面", "评论支持"]

groups:
  - id: "basic"
    label: "基础信息与个人资料"
    icon: "globe"
    fields:
      - name: "avatar"
        label: "侧边栏头像 URL / 相对路径"
        type: "text"
        description: "主题路径下的相对图片 (如 /images/avatar.png) 或网络图片 URL"
        default: "/images/avatar.png"

      - name: "author"
        label: "博主名称"
        type: "text"
        description: "侧边栏显示的博主名字"
        default: "Your Name"

      - name: "subtitle"
        label: "座右铭 / 签名"
        type: "text"
        description: "头像下方的斜体签名"
        default: "Sharing thoughts and knowledge"

      - name: "favicon"
        label: "站点 Favicon"
        type: "text"
        description: "浏览器标签页小图标"
        default: "/favicon.ico"

  - id: "social"
    label: "左侧栏社交联系方式 (配置后才显示)"
    icon: "share-2"
    fields:
      - name: "social.github"
        label: "GitHub 个人主页 URL"
        type: "text"
        description: "例如: https://github.com/your-username (留空则不显示图标)"
        default: "https://github.com"

      - name: "social.rss"
        label: "RSS 订阅 Feed 路径"
        type: "text"
        description: "例如: /atom.xml (留空则不显示图标)"
        default: "/atom.xml"

      - name: "social.email"
        label: "电子邮箱 (Email)"
        type: "text"
        description: "例如: mailto:your_name@example.com 或 邮箱地址 (留空则不显示图标)"
        default: ""

      - name: "social.qq"
        label: "QQ 号码 / 联系链接"
        type: "text"
        description: "例如: 123456789 或 tencent 临时会话链接 (留空则不显示图标)"
        default: ""

      - name: "social.wechat"
        label: "微信微信号 / 二维码图片路径"
        type: "text"
        description: "例如: /images/wechat_qr.png 或微信号 (留空则不显示图标)"
        default: ""

  - id: "about"
    label: "关于页面配置 (About Page)"
    icon: "globe"
    fields:
      - name: "about.name"
        label: "关于页显示名称"
        type: "text"
        default: "Your Name"

      - name: "about.avatar"
        label: "个人头像路径"
        type: "text"
        description: "例如: /images/avatar.jpg 或网络图片 URL"
        default: "/images/avatar.jpg"

      - name: "about.role"
        label: "职业 / 角色标签"
        type: "text"
        default: "Developer / Creator"

      - name: "about.bio"
        label: "一句话简介 / 签名"
        type: "text"
        default: "Stay Hungry, Stay Foolish"

      - name: "about.skills"
        label: "技能 / 技术栈标签 (Skills)"
        type: "tags"
        description: "关于页展示的个人技能胶囊标签列表"
        default: []

      - name: "about.description"
        label: "关于页正文 Markdown 描述"
        type: "textarea"
        description: "可填写 Markdown 格式的个人经历、技术栈与博客介绍"
        default: "欢迎来到我的博客！这里记录我的技术探索与日常思考。"

  - id: "links"
    label: "友链页面配置 (Friends Links)"
    icon: "globe"
    fields:
      - name: "links_apply_tip"
        label: "申请友链说明 (Markdown 格式)"
        type: "textarea"
        description: "在友链页面卡片下方显示的申请规则说明"
        default: "欢迎交换友情链接！请在此页面下方留言或按照格式申请。"

      - name: "friends"
        label: "友情链接列表"
        type: "array"
        description: "动态配置友链项目列表（可新增、删除与编辑名称、链接、头像和描述）"
        default:
          - name: "Hexo 官方文档"
            url: "https://hexo.io"
            avatar: "https://hexo.io/icon/favicon-192x192.png"
            desc: "快速、简洁且高效的静态博客生成框架。"
          - name: "AirboZH 的博客"
            url: "https://www.airbozh.cn"
            avatar: "https://www.airbozh.cn/images/avatar.png"
            desc: "Chirpy 主题原作者与前端技术沉淀。"
          - name: "GitHub"
            url: "https://github.com"
            avatar: "https://github.githubassets.com/favicons/favicon.svg"
            desc: "全球最大的开源代码托管与协作平台。"

  - id: "style"
    label: "外观与视觉风格"
    icon: "palette"
    fields:
      - name: "style_preset"
        label: "设计预设风格 (Preset)"
        type: "select"
        description: "基于 awesome-design-skills 挑选的最佳配色方案"
        default: "chirpy"
        options:
          - value: "chirpy"
            label: "Chirpy Classic (经典暗极灰 + 紫禁青)"
          - value: "agentic"
            label: "Agentic (对话式 AI 界面)"
          - value: "ant"
            label: "Ant (企业级数据密集型)"
          - value: "artistic"
            label: "Artistic (高对比艺术表达)"
          - value: "basic"
            label: "Basic (报刊杂志排版)"
          - value: "bento"
            label: "Bento (便当盒模块网格)"
          - value: "bold"
            label: "Bold (强视觉粗体高对比)"
          - value: "brutalism"
            label: "Brutalism (粗犷主义反设计)"
          - value: "cafe"
            label: "Cafe (温馨咖啡馆暖调)"
          - value: "claude"
            label: "Claude (暖石纸本学术期刊)"
          - value: "claymorphism"
            label: "Claymorphism (黏土 3D 浮雕)"
          - value: "clean"
            label: "Clean (极简留白)"
          - value: "codex"
            label: "Codex (纯黑白无色极简)"
          - value: "colorful"
            label: "Colorful (缤纷高饱和)"
          - value: "contemporary"
            label: "Contemporary (现代极简)"
          - value: "corporate"
            label: "Corporate (商务企业)"
          - value: "cosmic"
            label: "Cosmic (赛博宇宙霓虹)"
          - value: "creative"
            label: "Creative (创意插画)"
          - value: "dithered"
            label: "Dithered (抖动网点复古)"
          - value: "doodle"
            label: "Doodle (手绘涂鸦)"
          - value: "dramatic"
            label: "Dramatic (戏剧高对比)"
          - value: "editorial"
            label: "Editorial (社论杂志排版)"
          - value: "enterprise"
            label: "Enterprise (暗色云平台)"
          - value: "expressive"
            label: "Expressive (鲜明个性)"
          - value: "fantasy"
            label: "Fantasy (奇幻游戏)"
          - value: "fiction"
            label: "Fiction (绘本童趣)"
          - value: "flat"
            label: "Flat (扁平化)"
          - value: "friendly"
            label: "Friendly (亲近柔和)"
          - value: "futuristic"
            label: "Futuristic (未来科技)"
          - value: "geometric"
            label: "Geometric (几何结构)"
          - value: "glassmorphism"
            label: "Glassmorphism (磨砂玻璃质感)"
          - value: "gradient"
            label: "Gradient (渐变光彩)"
          - value: "immersive"
            label: "Immersive (沉浸式展厅)"
          - value: "impeccable"
            label: "Impeccable (海报复古橙)"
          - value: "levels"
            label: "Levels (高转化极简)"
          - value: "lingo"
            label: "Lingo (3D 趣味交互)"
          - value: "material"
            label: "Material Design (谷歌材质)"
          - value: "matrix"
            label: "Matrix (极客黑客绿字)"
          - value: "minimal"
            label: "Minimal (极简清爽)"
          - value: "modern"
            label: "Modern (现代时尚)"
          - value: "mono"
            label: "Mono (单色极客)"
          - value: "neobrutalism"
            label: "Neobrutalism (新粗犷主义)"
          - value: "neon"
            label: "Neon (发光霓虹)"
          - value: "neumorphism"
            label: "Neumorphism (拟物软阴影)"
          - value: "pacman"
            label: "Pacman (8-Bit 像素吃豆人)"
          - value: "paper"
            label: "Paper (纸张质感)"
          - value: "perspective"
            label: "Perspective (透视空间)"
          - value: "power"
            label: "Power (高端暗黑)"
          - value: "premium"
            label: "Premium (Apple 极致质感)"
          - value: "professional"
            label: "Professional (专业商务)"
          - value: "pulse"
            label: "Pulse (动态活力)"
          - value: "refined"
            label: "Refined (精致优雅)"
          - value: "retro"
            label: "Retro (复古怀旧)"
          - value: "riso"
            label: "Riso (双色孔版印刷)"
          - value: "roku"
            label: "Roku (紫色仪表盘)"
          - value: "sega"
            label: "Sega (街机像素)"
          - value: "shadcn"
            label: "Shadcn (Shadcn 简约)"
          - value: "sketch"
            label: "Sketch (铅笔手绘)"
          - value: "skeumorphism"
            label: "Skeumorphism (拟物质感)"
          - value: "sleek"
            label: "Sleek (时尚流畅)"
          - value: "spacious"
            label: "Spacious (宽敞留白)"
          - value: "square"
            label: "Square (典雅高贵)"
          - value: "stitch"
            label: "Stitch (数据驱动)"
          - value: "storytelling"
            label: "Storytelling (故事叙事)"
          - value: "terracotta"
            label: "Terracotta (陶土暖色)"
          - value: "tetris"
            label: "Tetris (俄罗斯方块)"
          - value: "vibrant"
            label: "Vibrant (亮丽活力)"
          - value: "vintage"
            label: "Vintage (怀旧复古)"

      

      - name: "color_scheme"
        label: "主题明暗模式"
        type: "select"
        description: "控制页面的默认色彩模式"
        default: "auto"
        options:
          - value: "auto"
            label: "跟随系统 (Auto System)"
          - value: "light"
            label: "默认浅色 (Light)"
          - value: "dark"
            label: "默认深色 (Dark)"

      - name: "accent_color"
        label: "品牌强调色 (Accent)"
        type: "color"
        description: "链接、选中态高亮与按钮强调色"
        default: "#7952b3"

  - id: "features"
    label: "交互功能开关"
    icon: "sliders"
    fields:
      - name: "toc_enabled"
        label: "文章 TOC 悬浮目录"
        type: "switch"
        description: "在文章页右侧悬浮显示层次化的标题导航目录"
        default: true

      - name: "reading_progress"
        label: "阅读进度条"
        type: "switch"
        description: "在页面顶部显示实时滚动阅读百分比条"
        default: true

      - name: "code_copy"
        label: "代码块一键复制按钮"
        type: "switch"
        description: "在所有代码高亮块右上角生成快捷复制图标"
        default: true

      - name: "per_page"
        label: "首页每页显示文章数"
        type: "number"
        default: 10
        min: 1
        max: 50

  - id: "comments"
    label: "评论系统设置"
    icon: "message-square"
    fields:
      - name: "comments_enabled"
        label: "启用评论区"
        type: "switch"
        description: "开启后将在文章、友链及关于页面底部显示评论框"
        default: false

      - name: "comments_provider"
        label: "评论服务提供商"
        type: "select"
        default: "waline"
        options:
          - value: "waline"
            label: "Waline (推荐：轻量美观全能)"
          - value: "giscus"
            label: "Giscus (GitHub Discussions)"
          - value: "disqus"
            label: "Disqus"

      - name: "waline_server_url"
        label: "Waline 服务端 URL"
        type: "text"
        description: "例如: https://your-waline-instance.vercel.app"
        default: ""

      - name: "disqus_shortname"
        label: "Disqus Shortname"
        type: "text"
        default: ""

      - name: "giscus_repo"
        label: "Giscus 仓库 (owner/repo)"
        type: "text"
        default: ""

  - id: "custom_code"
    label: "自定义代码注入"
    icon: "code"
    fields:
      - name: "head_code"
        label: "<head> 注入代码"
        type: "code"
        language: "html"
        description: "自定义注入到页面 <head> 区域的统计脚本或 CSS"
        default: ""

      - name: "footer_code"
        label: "页脚 </body> 注入代码"
        type: "code"
        language: "html"
        description: "自定义注入到页面尾部的 JS 扩展"
        default: ""
